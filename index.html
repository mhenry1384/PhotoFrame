<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhotoFrame</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main class="app-shell" data-image-maximized="false">
      <header class="topbar">
        <div>
          <p class="eyebrow">Desktop Slideshow</p>
          <h1>PhotoFrame</h1>
        </div>
        <div class="topbar-actions">
          <button id="open-settings" type="button">Settings</button>
        </div>
      </header>

      <section class="statusbar">
        <div>
          <span class="status-label">Current image</span>
          <strong id="current-image-name">Loading settings...</strong>
        </div>
        <div>
          <span class="status-label">Status</span>
          <strong id="viewer-status">Starting up...</strong>
        </div>
        <div>
          <span class="status-label">Count</span>
          <strong id="image-counter">0 images</strong>
        </div>
      </section>

      <section class="photo-stage" id="photo-stage" data-empty="true">
        <div class="photo-controls">
          <button
            id="next-image-overlay"
            type="button"
            class="icon-button"
            aria-label="Show next image"
            title="Show next image"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path
                d="M7 6l8 6-8 6V6zm10 0v12"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.8"
              />
            </svg>
          </button>
          <button
            id="restore-layout"
            type="button"
            class="icon-button"
            aria-label="Enter max image mode"
            title="Enter max image mode"
          >
            <svg
              class="icon-expand"
              viewBox="0 0 24 24"
              aria-hidden="true"
              focusable="false"
            >
              <path
                d="M9 3H3v6M15 3h6v6M3 15v6h6M21 15v6h-6"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.8"
              />
            </svg>
            <svg
              class="icon-collapse"
              viewBox="0 0 24 24"
              aria-hidden="true"
              focusable="false"
            >
              <path
                d="M7 3H3v4M17 3h4v4M3 17v4h4M21 17v4h-4"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.8"
              />
            </svg>
          </button>
        </div>
        <img id="photo" alt="Current slideshow image" hidden />
        <div class="empty-state">
          <p id="empty-message">Loading settings...</p>
        </div>
      </section>
    </main>

    <dialog id="settings-dialog">
      <form id="settings-form" method="dialog" class="settings-form">
        <div class="dialog-header">
          <div>
            <p class="eyebrow">Configuration</p>
            <h2>Settings</h2>
          </div>
        </div>

        <label class="field">
          <span>Image directory</span>
          <input
            id="directory-path"
            name="directoryPath"
            type="text"
            placeholder="/Users/you/Pictures"
            autocomplete="off"
          />
        </label>

        <label class="field">
          <span>Interval in seconds</span>
          <input
            id="interval-seconds"
            name="intervalSeconds"
            type="number"
            min="1"
            step="1"
            inputmode="numeric"
          />
        </label>

        <p id="settings-status" class="settings-status"></p>

        <menu class="dialog-actions">
          <button
            type="button"
            value="cancel"
            class="secondary-button"
            onclick="document.getElementById('settings-dialog').close()"
          >
            Cancel
          </button>
          <button type="submit">Save</button>
        </menu>
      </form>
    </dialog>
  </body>
</html>
